name: Train and Report

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data from Cloud.ru
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify cloudru endpointurl https://s3.cloud.ru
          dvc pull

      - name: Reproduce pipeline
        run: dvc repro

      - name: Generate report
        id: report
        run: |
          echo "## Результаты эксперимента" > report.md
          echo "### Изменения параметров:" >> report.md
          dvc params diff main --md >> report.md
          echo "### Изменения метрик:" >> report.md
          dvc metrics diff main --md >> report.md
          echo 'REPORT<<EOF' >> $GITHUB_OUTPUT
          cat report.md >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.report.outputs.REPORT }}